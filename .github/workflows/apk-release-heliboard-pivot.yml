name: APK Release Seekerboard QA

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apk-release-seekerboard-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build Seekerboard QA APK
        working-directory: vendor/heliboard_src
        run: ./gradlew :app:assembleDebugNoMinify --stacktrace

      - name: Normalize APK name
        working-directory: vendor/heliboard_src/app/build/outputs/apk/debugNoMinify
        run: |
          apk_path="$(ls -1 *.apk | head -n 1)"
          mv "$apk_path" "Seekerboard_qa.apk"

      - name: Create release tag
        id: tag
        run: echo "tag_name=seekerboard-qa-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Seekerboard QA ${{ steps.tag.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: false
          files: vendor/heliboard_src/app/build/outputs/apk/debugNoMinify/Seekerboard_qa.apk
