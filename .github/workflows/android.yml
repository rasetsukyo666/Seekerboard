name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build app and ime
        run: ./gradlew :app:assembleDebug :ime:assembleDebug

      - name: Upload QA notes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seekerkeyboard-device-qa
          path: README.md
          if-no-files-found: warn

      - name: Upload app APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seekerkeyboard-app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload ime AAR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seekerkeyboard-ime-debug
          path: ime/build/outputs/aar/*.aar
          if-no-files-found: warn
