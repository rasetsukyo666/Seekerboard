name: Android CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  seekerboard-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build Seekerboard QA APK
        working-directory: vendor/heliboard_src
        run: ./gradlew :app:assembleDebugNoMinify --stacktrace

      - name: Normalize APK name
        working-directory: vendor/heliboard_src/app/build/outputs/apk/debugNoMinify
        run: |
          apk_path="$(ls -1 *.apk | head -n 1)"
          mv "$apk_path" "Seekerboard_qa.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Seekerboard_qa
          path: vendor/heliboard_src/app/build/outputs/apk/debugNoMinify/Seekerboard_qa.apk

      - name: Create release tag
        id: tag
        run: echo "tag_name=seekerboard-qa-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Seekerboard QA ${{ steps.tag.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: false
          files: vendor/heliboard_src/app/build/outputs/apk/debugNoMinify/Seekerboard_qa.apk

  seekerboard-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/seekerboard-release.jks"

      - name: Build signed release APK
        working-directory: vendor/heliboard_src
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/seekerboard-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Normalize release APK name
        working-directory: vendor/heliboard_src/app/build/outputs/apk/release
        run: |
          apk_path="$(ls -1 *.apk | head -n 1)"
          mv "$apk_path" "Seekerboard_release.apk"

      - name: Upload signed release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Seekerboard_release
          path: vendor/heliboard_src/app/build/outputs/apk/release/Seekerboard_release.apk

      - name: Create release tag
        id: release_tag
        run: echo "tag_name=seekerboard-release-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish signed release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          name: Seekerboard Release ${{ steps.release_tag.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          generate_release_notes: false
          files: vendor/heliboard_src/app/build/outputs/apk/release/Seekerboard_release.apk
